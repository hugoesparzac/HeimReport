services:
  database:
    image: postgres:17.2
    container_name: HeimReport-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER it is not defined}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD it is not defined}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB it is not defined}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local