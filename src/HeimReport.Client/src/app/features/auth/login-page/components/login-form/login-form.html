<div class="relative flex flex-col w-full h-screen justify-center items-center font-sans overflow-hidden bg-[#E7ECF3] px-4">
    <!-- Círculos difuminados de fondo -->
    <div class="absolute top-[-10%] left-[-10%] h-125 w-125 rounded-full bg-blue-400/20 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-5%] h-150 w-150 rounded-full bg-indigo-300/30 blur-[140px] pointer-events-none"></div>
    <div class="absolute top-[30%] right-[20%] h-100 w-100 rounded-full bg-rose-300/15 blur-[100px] pointer-events-none"></div>

    <!-- Accesibilidad (Esquina Superior Derecha) -->
    <div class="absolute top-6 right-6 flex gap-3 z-20">
        <button class="w-11 h-11 rounded-full flex items-center justify-center bg-white/80 border border-white backdrop-blur-md shadow-sm text-[#0F172A] hover:bg-white transition">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <button class="w-11 h-11 rounded-full flex items-center justify-center bg-white/80 border border-white backdrop-blur-md shadow-sm text-[#0F172A] hover:bg-white text-sm font-semibold transition">
            ES
        </button>
    </div>

    <!-- Contenedor Principal Centralizado -->
    <div class="relative z-10 w-full max-w-md flex flex-col gap-6">
        <!-- Header e Interfaz Unificada de Login -->
        <div class="bg-[#F8FAFC]/75 border border-white backdrop-blur-xl rounded-3xl p-8 shadow-[0_10px_30px_-12px_rgba(13,13,13,0.08)]">
            <div class="text-center mb-8">
                <h1 class="font-bold text-4xl mb-4 text-[#0F172A] tracking-tight">HeimReport</h1>
                <p class="text-[#6b7686] mb-6 text-sm">Sistema de predicción de deserción de empleados</p>
            </div>

            <form class="flex flex-col text-[#6b7686] text-[15px]">

                <div class="flex flex-col gap-4 font-semibold mb-6">
                    <div class="flex flex-col gap-1.5">
                        <label for="email" class="text-xs tracking-wide uppercase text-[#6b7686]/80">Correo Corporativo</label>
                        <input id="email" type="email" placeholder="nombre@empresa.com" class="w-full px-4 py-3.5 rounded-2xl border border-[#E7ECF3] bg-white text-[#0F172A] text-[15px] outline-none focus:ring-2 focus:ring-[#0F172A]/10 focus:border-[#0F172A]/20 placeholder:text-[#a7b0be] font-normal transition">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label for="password" class="text-xs tracking-wide uppercase text-[#6b7686]/80">Contraseña</label>
                        <input id="password" type="password" placeholder="••••••••" class="w-full px-4 py-3.5 rounded-2xl border border-[#E7ECF3] bg-white text-[#0F172A] text-[15px] outline-none focus:ring-2 focus:ring-[#0F172A]/10 focus:border-[#0F172A]/20 placeholder:text-[#a7b0be] font-normal transition">
                    </div>
                </div>


                

                
               <app-button variant="primary" [fullWidth]="true">
  Ingresar
  <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="5" y1="12" x2="19" y2="12"></line>
    <polyline points="12 5 19 12 12 19"></polyline>
  </svg>
</app-button>

            </form>
        </div>

        <!-- Help -->
        <div class="flex justify-center">
            <div class="inline-flex items-center gap-2 bg-white/80 border border-[#E7ECF3] backdrop-blur-md rounded-full px-5 py-2.5 text-[#55606f] text-xs font-medium shadow-[0_10px_25px_-12px_rgba(13,13,13,0.05)] cursor-pointer hover:bg-white transition">
                <svg class="w-3.5 h-3.5 text-[#8992a3]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 2-3 4"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                ¿Necesitas ayuda con tu acceso?
            </div>
        </div>
    </div>
</div>
