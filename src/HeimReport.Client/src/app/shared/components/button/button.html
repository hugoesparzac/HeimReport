<button
  [type]="type()"
  [disabled]="disabled()"
  (click)="onClick()"
  [class.w-full]="fullWidth()"
  [class]="variant() === 'primary'
    ? 'bg-[#0F172A] text-white hover:bg-black shadow-[0_8px_20px_-6px_rgba(13,13,13,0.3)] px-6 py-4 rounded-2xl'
    : variant() === 'outline-dark'
      ? 'bg-white text-[#0F172A] border border-[#E7ECF3] hover:bg-[#0F172A] hover:text-white px-6 py-2.5 rounded-full'
      : variant() === 'danger'
        ? 'bg-[#ba1a1a] text-white hover:bg-[#93000a] shadow-[0_8px_20px_-6px_rgba(186,26,26,0.3)] px-6 py-4 rounded-2xl'
        : 'bg-white text-[#0F172A] border border-[#E7ECF3] hover:bg-[#E7ECF3] px-6 py-2.5 rounded-full'"
  class="text-[15px] font-semibold transition duration-200 flex items-center gap-2 justify-center disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
>
  <ng-content />
</button>
